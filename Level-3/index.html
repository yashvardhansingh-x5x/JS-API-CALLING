<!DOCTYPE html>
<html>
<head>
  <title>Level 3 API Handling</title>
</head>
<body>

  <!-- Dropdown -->
  <select id="category">
    <option value="">Select Category</option>
    <option value="posts">Posts</option>
    <option value="users">Users</option>
  </select>

  <br><br>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search..." />

  <br><br>

  <!-- Button -->
  <button id="fetchBtn">Fetch Data</button>

  <p id="status"></p>
  <div id="output"></div>

<script>
let controller = null; // for aborting previous requests
let debounceTimer = null;
let isFetching = false;

// ============================
// COMMON FETCH FUNCTION
// ============================
async function fetchData(url) {
  // Abort previous request
  if (controller) {
    controller.abort();
  }

  controller = new AbortController();
  const signal = controller.signal;

  try {
    document.getElementById("status").innerText = "Loading...";

    const res = await fetch(url, { signal });
    const data = await res.json();

    document.getElementById("status").innerText = "Success";

    renderData(data);

  } catch (err) {
    if (err.name === "AbortError") {
      console.log("Previous request cancelled");
    } else {
      document.getElementById("status").innerText = "Error";
    }
  }
}

// ============================
// RENDER FUNCTION
// ============================
function renderData(data) {
  const output = document.getElementById("output");

  if (!data || data.length === 0) {
    output.innerHTML = "No Data Found";
    return;
  }

  output.innerHTML = data.slice(0,5).map(item => 
    `<p>${item.name || item.title}</p>`
  ).join("");
}

// ============================
// 1. DROPDOWN API CALL
// ============================
document.getElementById("category").addEventListener("change", (e) => {
  const value = e.target.value;

  if (!value) return;

  fetchData(`https://jsonplaceholder.typicode.com/${value}`);
});

// ============================
// 2. SEARCH INPUT API CALL
// ============================
document.getElementById("search").addEventListener("input", (e) => {
  const query = e.target.value;

  // ============================
  // 3. DEBOUNCING
  // ============================
  clearTimeout(debounceTimer);

  debounceTimer = setTimeout(() => {
    if (query.length < 2) return;

    fetchData(`https://jsonplaceholder.typicode.com/users?name_like=${query}`);
  }, 500);
});

// ============================
// 5. PREVENT DOUBLE CLICK
// ============================
document.getElementById("fetchBtn").addEventListener("click", async () => {

  if (isFetching) return; // prevent multiple calls

  isFetching = true;

  await fetchData("https://jsonplaceholder.typicode.com/posts");

  isFetching = false;
});
</script>

</body>
</html>
