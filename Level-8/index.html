<!DOCTYPE html>
<html>
<head>
  <title>Level 8 API Architecture</title>
</head>
<body>

<button id="fetch">Fetch Data</button>
<p id="status"></p>
<div id="output"></div>

<script>
// ============================
// CONFIG
// ============================
const CONFIG = {
  BASE_URL: "https://jsonplaceholder.typicode.com",
  TIMEOUT: 3000,
  RETRIES: 2,
};

// ============================
// GLOBAL TOKEN (SIMULATED)
// ============================
let token = "demo-token";

// ============================
// CENTRAL API HELPER
// ============================
async function apiRequest(endpoint, options = {}, retries = CONFIG.RETRIES) {

  const url = CONFIG.BASE_URL + endpoint;

  const controller = new AbortController();

  const timeoutId = setTimeout(() => {
    controller.abort();
  }, CONFIG.TIMEOUT);

  try {

    // ============================
    // COMMON HEADERS
    // ============================
    const headers = {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...options.headers
    };

    const response = await fetch(url, {
      ...options,
      headers,
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    // ============================
    // COMMON ERROR HANDLER
    // ============================
    if (!response.ok) {
      handleError(response);
    }

    const data = await response.json();

    // ============================
    // RESPONSE TRANSFORMER
    // ============================
    return transformResponse(data);

  } catch (err) {

    // Timeout / Network Retry
    if (retries > 0) {
      console.log("Retrying...");
      await delay(1000);
      return apiRequest(endpoint, options, retries - 1);
    }

    document.getElementById("status").innerText = "Failed after retries";
    throw err;
  }
}

// ============================
// ERROR HANDLER
// ============================
function handleError(res) {

  if (res.status === 401) {
    document.getElementById("status").innerText = "Unauthorized";
    throw new Error("401 Unauthorized");
  }

  if (res.status === 404) {
    document.getElementById("status").innerText = "Not Found";
    throw new Error("404 Not Found");
  }

  if (res.status >= 500) {
    document.getElementById("status").innerText = "Server Error";
    throw new Error("500 Server Error");
  }

  throw new Error("Unknown Error");
}

// ============================
// RESPONSE TRANSFORMER
// ============================
function transformResponse(data) {

  // Normalize data (example)
  return data.map(item => ({
    id: item.id,
    title: item.title || item.name
  }));
}

// ============================
// DELAY (for retry)
// ============================
function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// ============================
// USAGE
// ============================
document.getElementById("fetch").addEventListener("click", async () => {

  document.getElementById("status").innerText = "Loading...";

  try {
    const data = await apiRequest("/posts");

    renderData(data);

    document.getElementById("status").innerText = "Success";

  } catch (err) {
    console.log(err.message);
  }
});

// ============================
// RENDER
// ============================
function renderData(data) {
  const output = document.getElementById("output");

  output.innerHTML = data.slice(0,5).map(item =>
    `<p>${item.title}</p>`
  ).join("");
}
</script>

</body>
</html>
